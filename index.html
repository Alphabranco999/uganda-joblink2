<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uganda JobsLink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;

        /* DEEP NAVY BACKGROUND */
        background: #001A33;

        font-family: 'Arial', sans-serif;
        color: white;
        text-align: center;
        overflow: hidden;
    }

    /* TOP IMAGE COVERING UPPER PART */
    .top-image {
        width: 100%;
        height: 45vh;
        background-image: url('image_888.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        animation: fadeInTop 1.2s ease-out forwards;
        opacity: 0;
    }

    @keyframes fadeInTop {
        from { opacity: 0; transform: translateY(-40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* LOGO BELOW IMAGE */
    .logo-space img {
        width: 180px;
        height: 180px;
        object-fit: contain;
        opacity: 0;
        margin-top: -60px;

        animation: fadeIn 0.6s ease-out forwards, rotate3D 3s cubic-bezier(.25,.8,.25,1) forwards;
        animation-delay: 0.5s, 0.5s;

        filter: drop-shadow(0 0 25px rgba(255,255,255,0.25));
        transform-style: preserve-3d;
    }

    @keyframes fadeIn {
        0% { opacity: 0; transform: scale(0.7); }
        100% { opacity: 1; transform: scale(1); }
    }

    @keyframes rotate3D {
        0% { transform: rotateY(0deg) scale(0.9); }
        40% { transform: rotateY(180deg) scale(1.05); }
        100% { transform: rotateY(360deg) scale(1); }
    }

    /* TITLE */
    h1 {
        margin: 10px 0 10px 0;
        font-size: 36px;
        font-weight: bold;
        opacity: 0;
        text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    @keyframes zoomIn {
        0% { transform: scale(0.2); opacity: 0; }
        60% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }

    .animate-title {
        animation: zoomIn 1.2s ease-out forwards;
    }

    /* LOADING TEXT */
    .loading-text {
        font-size: 20px;
        margin-top: 5px;
        opacity: 0;
        animation: fadeInText 1s ease-out forwards;
        animation-delay: 2.2s;
    }

    @keyframes fadeInText {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .dots::after {
        content: '';
        animation: dots 1.5s infinite;
    }

    @keyframes dots {
        0% { content: ''; }
        33% { content: '.'; }
        66% { content: '..'; }
        100% { content: '...'; }
    }

    /* PERCENTAGE */
    .percent {
        font-size: 22px;
        margin-top: 5px;
        opacity: 0;
        animation: fadeInPercent 1s ease-out forwards;
        animation-delay: 2.4s;
    }

    @keyframes fadeInPercent {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* PROGRESS BAR */
    .progress-container {
        width: 80%;
        max-width: 320px;
        height: 14px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        margin-top: 15px;
        overflow: hidden;
        opacity: 0;
        animation: fadeInBar 1s ease-out forwards;
        animation-delay: 2.6s;
    }

    @keyframes fadeInBar {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #1DBF73, #FFD700, #FF5733, #1A73E8);
        background-size: 300% 100%;
        animation: loadBar 4s ease-out forwards, colorShift 4s linear infinite;
        animation-delay: 2.8s;
    }

    @keyframes loadBar {
        0% { width: 0%; }
        30% { width: 40%; }
        60% { width: 75%; }
        100% { width: 100%; }
    }

    @keyframes colorShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

    /* FADE OUT */
    .fade-out {
        animation: fadeOutScreen 1s ease forwards;
    }

    @keyframes fadeOutScreen {
        from { opacity: 1; }
        to { opacity: 0; transform: scale(1.05); }
    }

</style>
</head>

<body>

    <!-- TOP IMAGE -->
    <div class="top-image"></div>

    <!-- LOGO -->
    <div class="logo-space">
        <img src="image_888.jpg" alt="Uganda JobsLink Logo">
    </div>

    <!-- TITLE -->
    <h1 id="title">Uganda JobsLink</h1>

    <!-- LOADING TEXT -->
    <div class="loading-text"><span class="dots">Loading</span></div>

    <!-- PERCENT -->
    <div class="percent" id="percent">0%</div>

    <!-- PROGRESS BAR -->
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

<script>
    window.onload = () => {

        // Title animation
        setTimeout(() => {
            document.getElementById("title").classList.add("animate-title");
        }, 600);

        // Start loading AFTER 2 seconds
        setTimeout(() => {
            let percent = 0;
            let counter = setInterval(() => {
                percent++;
                document.getElementById("percent").innerText = percent + "%";

                if (percent >= 100) {
                    clearInterval(counter);

                    // Fade out transition
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = "index2.html";
                    }, 900);
                }
            }, 40);
        }, 2000); // 2-second delay
    };
</script>

</body>
</html>
