<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uganda JobsLink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #001A33;
        font-family: 'Arial', sans-serif;
        color: white;
        text-align: center;
        overflow: hidden;
    }

    /* WRAPPER */
    .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 420px;
        transform: translateY(-20px); /* slight lift */
    }

    /* WHITE GLOWING IMAGE BOX WITH 3D ANIMATION */
    .image-box {
        width: 90%;
        max-width: 400px;
        height: 260px; /* increased height */
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(255,255,255,0.35);
        opacity: 0;
        animation: imageEnter 1.4s ease-out forwards;
        transform-style: preserve-3d;
    }

    @keyframes imageEnter {
        0% {
            opacity: 0;
            transform: translateY(-80px) scale(0.6) rotateX(25deg);
            box-shadow: 0 0 0 rgba(255,255,255,0);
        }
        60% {
            opacity: 1;
            transform: translateY(-30px) scale(1.08) rotateX(0deg);
            box-shadow: 0 0 25px rgba(255,255,255,0.45);
        }
        100% {
            opacity: 1;
            transform: translateY(-40px) scale(1) rotateX(0deg);
            box-shadow: 0 0 25px rgba(255,255,255,0.35);
        }
    }

    .image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* MAIN SUBTITLE (HERO TEXT) */
    .welcome {
        font-size: 26px;
        font-weight: 700;
        margin-top: -10px;
        opacity: 0;
        animation: fadeWelcome 1.2s ease-out forwards;
        animation-delay: 0.9s;
        color: #FFFFFF;
        text-shadow: 0 0 14px rgba(255,255,255,0.45);
        letter-spacing: 0.7px;
    }

    @keyframes fadeWelcome {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* LOADING TEXT (MOVED DOWN) */
    .loading-text {
        font-size: 16px;
        margin-top: 25px; /* moved down */
        opacity: 0;
        animation: fadeInText 1s ease-out forwards;
        animation-delay: 1.8s;
        color: #D0D8E0;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    @keyframes fadeInText {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .dots::after {
        content: '';
        animation: dots 1.5s infinite;
    }

    @keyframes dots {
        0% { content: ''; }
        33% { content: '.'; }
        66% { content: '..'; }
        100% { content: '...'; }
    }

    /* PERCENTAGE */
    .percent {
        font-size: 16px;
        margin-top: 6px;
        opacity: 0;
        animation: fadeInPercent 1s ease-out forwards;
        animation-delay: 2s;
    }

    @keyframes fadeInPercent {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* PROGRESS BAR */
    .progress-container {
        width: 80%;
        height: 12px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        margin-top: 12px;
        overflow: hidden;
        opacity: 0;
        animation: fadeInBar 1s ease-out forwards;
        animation-delay: 2.2s;
        box-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    @keyframes fadeInBar {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00FFA3, #00D4FF, #0084FF);
        background-size: 300% 100%;
        animation: loadBar 4s ease-out forwards, glowShift 3s linear infinite;
        animation-delay: 2.4s;
        border-radius: 20px;
    }

    @keyframes loadBar {
        0% { width: 0%; }
        30% { width: 40%; }
        60% { width: 75%; }
        100% { width: 100%; }
    }

    @keyframes glowShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

</style>
</head>

<body>

<div class="wrapper">

    <div class="image-box">
        <img src="image_666.png" alt="Uganda JobsLink">
    </div>

    <h2 class="welcome">Connecting Workers and Employers</h2>

    <div class="loading-text"><span class="dots">Loading</span></div>

    <div class="percent" id="percent">0%</div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

</div>

<script>
    window.onload = () => {
        setTimeout(() => {
            let percent = 0;
            let counter = setInterval(() => {
                percent++;
                document.getElementById("percent").innerText = percent + "%";

                if (percent >= 100) {
                    clearInterval(counter);
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = "index2.html";
                    }, 900);
                }
            }, 40);
        }, 2000);
    };
</script>

</body>
</html>
