<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uganda JobLink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0A2A6B, #003F8A);
        font-family: 'Arial', sans-serif;
        color: white;
        text-align: center;
    }

    /* Logo fade-in */
    .logo-space img {
        width: 160px;
        height: 160px;
        object-fit: contain;
        opacity: 0;
        animation: fadeIn 1.2s ease-out forwards;
        animation-delay: 0.2s;
        margin-bottom: 25px;
    }

    @keyframes fadeIn {
        0% { opacity: 0; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1); }
    }

    /* Title animation */
    h1 {
        margin: 0 0 35px 0;
        font-size: 46px;
        font-weight: bold;
        opacity: 0;
        text-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    @keyframes zoomIn {
        0% { transform: scale(0.2); opacity: 0; }
        60% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }

    .animate-title {
        animation: zoomIn 1.2s ease-out forwards;
    }

    /* Button slide-up */
    button {
        padding: 18px 0;
        font-size: 24px;
        font-weight: bold;
        border: none;
        border-radius: 14px;
        width: 80%;
        max-width: 320px;
        background: #1DBF73;
        color: white;
        cursor: pointer;
        box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        opacity: 0;
        transform: translateY(40px);
        animation: slideUp 1s ease-out forwards;
        animation-delay: 1.2s;
    }

    @keyframes slideUp {
        0% { opacity: 0; transform: translateY(40px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    button:hover {
        background: #17a361;
        transform: translateY(-3px);
    }

    button:active {
        transform: scale(0.97);
    }

    /* Loading spinner */
    .spinner {
        margin-top: 20px;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: #1DBF73;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        opacity: 0;
        animation-delay: 1.4s;
        animation-fill-mode: forwards;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .logo-space img {
            width: 130px;
            height: 130px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            font-size: 22px;
        }
    }
</style>
</head>

<body>

    <div class="logo-space">
        <img src="image_1775753963503.jpeg" alt="Uganda JobsLink Logo">
    </div>

    <h1 id="title">Uganda JobsLink</h1>

    <button onclick="document.location='index2.html'">OPEN</button>

    <div class="spinner"></div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById("title").classList.add("animate-title");
            }, 300);
        };
    </script>

</body>
</html>
