<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uganda JobsLink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;

        background: #001A33;
        font-family: 'Arial', sans-serif;
        color: white;
        text-align: center;
        overflow: hidden;
    }

    /* TOP IMAGE */
    .top-image {
        width: 100%;
        height: 38vh;
        background-image: url('image_888.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        animation: fadeInTop 1.2s ease-out forwards;
        opacity: 0;
    }

    @keyframes fadeInTop {
        from { opacity: 0; transform: translateY(-40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* MAIN CONTENT WRAPPER */
    .content {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 30px; /* moved slightly down */
    }

    /* SUBTITLE */
    .welcome {
        font-size: 20px;
        font-weight: 600;
        margin-top: 5px;
        opacity: 0;
        animation: fadeWelcome 1.2s ease-out forwards;
        animation-delay: 0.8s;
        color: #E0E8F0;
    }

    @keyframes fadeWelcome {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* TITLE */
    h1 {
        margin: 10px 0 20px 0;
        font-size: 32px;
        font-weight: bold;
        opacity: 0;
        animation: zoomIn 1.2s ease-out forwards;
        animation-delay: 1.2s;
        color: #FFFFFF;
    }

    @keyframes zoomIn {
        0% { transform: scale(0.8); opacity: 0; }
        60% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* LOADING TEXT */
    .loading-text {
        font-size: 18px;
        margin-top: 20px; /* more spacing */
        opacity: 0;
        animation: fadeInText 1s ease-out forwards;
        animation-delay: 2s;
        color: #D0D8E0;
        letter-spacing: 0.5px;
    }

    @keyframes fadeInText {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .dots::after {
        content: '';
        animation: dots 1.5s infinite;
    }

    @keyframes dots {
        0% { content: ''; }
        33% { content: '.'; }
        66% { content: '..'; }
        100% { content: '...'; }
    }

    /* PERCENTAGE */
    .percent {
        font-size: 20px;
        margin-top: 8px;
        opacity: 0;
        animation: fadeInPercent 1s ease-out forwards;
        animation-delay: 2.2s;
        color: #FFFFFF;
    }

    @keyframes fadeInPercent {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* IMPROVED PROGRESS BAR */
    .progress-container {
        width: 80%;
        max-width: 320px;
        height: 14px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        margin-top: 15px;
        overflow: hidden;
        opacity: 0;
        animation: fadeInBar 1s ease-out forwards;
        animation-delay: 2.4s;
        box-shadow: 0 0 10px rgba(255,255,255,0.15);
    }

    @keyframes fadeInBar {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #1DBF73, #FFD700, #FF5733, #1A73E8);
        background-size: 300% 100%;
        animation: loadBar 4s ease-out forwards, colorShift 4s linear infinite;
        animation-delay: 2.6s;
        border-radius: 20px;
    }

    @keyframes loadBar {
        0% { width: 0%; }
        30% { width: 40%; }
        60% { width: 75%; }
        100% { width: 100%; }
    }

    @keyframes colorShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

    /* FADE OUT */
    .fade-out {
        animation: fadeOutScreen 1s ease forwards;
    }

    @keyframes fadeOutScreen {
        from { opacity: 1; }
        to { opacity: 0; transform: scale(1.05); }
    }

</style>
</head>

<body>

    <!-- TOP IMAGE -->
    <div class="top-image"></div>

    <!-- CENTERED CONTENT -->
    <div class="content">

        <!-- SUBTITLE -->
        <h2 class="welcome">Connecting Workers and Employers</h2>

        <!-- TITLE -->
        <h1 id="title">Uganda JobsLink</h1>

        <!-- LOADING TEXT -->
        <div class="loading-text"><span class="dots">Loading</span></div>

        <!-- PERCENT -->
        <div class="percent" id="percent">0%</div>

        <!-- PROGRESS BAR -->
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>

    </div>

<script>
    window.onload = () => {

        // Start loading AFTER 2 seconds
        setTimeout(() => {
            let percent = 0;
            let counter = setInterval(() => {
                percent++;
                document.getElementById("percent").innerText = percent + "%";

                if (percent >= 100) {
                    clearInterval(counter);

                    // Fade out transition
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = "index2.html";
                    }, 900);
                }
            }, 40);
        }, 2000);
    };
</script>

</body>
</html>
