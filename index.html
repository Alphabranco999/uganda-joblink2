<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uganda JobsLink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #001A33;
        font-family: 'Arial', sans-serif;
        color: white;
        text-align: center;
        overflow: hidden;
    }

    /* WRAPPER */
    .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 420px;
        transform: translateY(-20px);
    }

    /* IMAGE BOX WITH 3D ANIMATION */
    .image-box {
        width: 90%;
        max-width: 400px;
        height: 260px;
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(255,255,255,0.35);
        opacity: 0;
        animation: imageEnter 1.4s ease-out forwards;
        transform-style: preserve-3d;
    }

    @keyframes imageEnter {
        0% { opacity: 0; transform: translateY(-80px) scale(0.6) rotateX(25deg); }
        60% { opacity: 1; transform: translateY(-30px) scale(1.08); }
        100% { opacity: 1; transform: translateY(-40px) scale(1); }
    }

    .image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* ANDROID-FRIENDLY FALL + BOUNCE + SETTLE LETTERS */
    .welcome {
        display: inline-block;
        margin-top: -5px;
        font-size: 22px;
        font-weight: 700;
        color: #FFFFFF;
        text-shadow: 0 0 12px rgba(255,255,255,0.45);
        letter-spacing: 0.3px;
        white-space: nowrap;
    }

    @media (max-width: 380px) {
        .welcome {
            font-size: 19px;
            letter-spacing: 0.2px;
            transform: scale(0.95);
        }
    }

    .welcome span {
        display: inline-block;
        opacity: 0;
        transform: translateY(-35px);
        animation: dropBounceSettle 0.75s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    /* FALL → BOUNCE → SETTLE */
    @keyframes dropBounceSettle {
        0%   { opacity: 0; transform: translateY(-35px); }
        55%  { opacity: 1; transform: translateY(0); }      /* hit baseline */
        75%  { transform: translateY(-10px); }               /* bounce up */
        100% { transform: translateY(0); }                   /* settle back */
    }

    /* LOADING TEXT */
    .loading-text {
        font-size: 16px;
        margin-top: 25px;
        opacity: 0;
        animation: fadeInText 1s ease-out forwards;
        animation-delay: 1.8s;
        color: #D0D8E0;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    @keyframes fadeInText {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .dots::after {
        content: '';
        animation: dots 1.5s infinite;
    }

    @keyframes dots {
        0% { content: ''; }
        33% { content: '.'; }
        66% { content: '..'; }
        100% { content: '...'; }
    }

    /* PERCENTAGE */
    .percent {
        font-size: 16px;
        margin-top: 6px;
        opacity: 0;
        animation: fadeInPercent 1s ease-out forwards;
        animation-delay: 2s;
    }

    @keyframes fadeInPercent {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* PROGRESS BAR */
    .progress-container {
        width: 80%;
        height: 12px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        margin-top: 12px;
        overflow: hidden;
        opacity: 0;
        animation: fadeInBar 1s ease-out forwards;
        animation-delay: 2.2s;
        box-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    @keyframes fadeInBar {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00FFA3, #00D4FF, #0084FF);
        background-size: 300% 100%;
        animation: loadBar 4s ease-out forwards, glowShift 3s linear infinite;
        animation-delay: 2.4s;
        border-radius: 20px;
    }

    @keyframes loadBar {
        0% { width: 0%; }
        30% { width: 40%; }
        60% { width: 75%; }
        100% { width: 100%; }
    }

    @keyframes glowShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

</style>
</head>

<body>

<div class="wrapper">

    <div class="image-box">
        <img src="image_666.png" alt="Uganda JobsLink">
    </div>

    <!-- FALL + BOUNCE + SETTLE LETTERS -->
    <h2 class="welcome">
        <span style="animation-delay:0.05s">C</span>
        <span style="animation-delay:0.10s">o</span>
        <span style="animation-delay:0.15s">n</span>
        <span style="animation-delay:0.20s">n</span>
        <span style="animation-delay:0.25s">e</span>
        <span style="animation-delay:0.30s">c</span>
        <span style="animation-delay:0.35s">t</span>
        <span style="animation-delay:0.40s">i</span>
        <span style="animation-delay:0.45s">n</span>
        <span style="animation-delay:0.50s">g</span>

        <span style="animation-delay:0.55s">&nbsp;</span>

        <span style="animation-delay:0.60s">W</span>
        <span style="animation-delay:0.65s">o</span>
        <span style="animation-delay:0.70s">r</span>
        <span style="animation-delay:0.75s">k</span>
        <span style="animation-delay:0.80s">e</span>
        <span style="animation-delay:0.85s">r</span>
        <span style="animation-delay:0.90s">s</span>

        <span style="animation-delay:0.95s">&nbsp;</span>

        <span style="animation-delay:1.00s">a</span>
        <span style="animation-delay:1.05s">n</span>
        <span style="animation-delay:1.10s">d</span>

        <span style="animation-delay:1.15s">&nbsp;</span>

        <span style="animation-delay:1.20s">E</span>
        <span style="animation-delay:1.25s">m</span>
        <span style="animation-delay:1.30s">p</span>
        <span style="animation-delay:1.35s">l</span>
        <span style="animation-delay:1.40s">o</span>
        <span style="animation-delay:1.45s">y</span>
        <span style="animation-delay:1.50s">e</span>
        <span style="animation-delay:1.55s">r</span>
        <span style="animation-delay:1.60s">s</span>
    </h2>

    <div class="loading-text"><span class="dots">Loading</span></div>

    <div class="percent" id="percent">0%</div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

</div>

<script>
    window.onload = () => {
        setTimeout(() => {
            let percent = 0;
            let counter = setInterval(() => {
                percent++;
                document.getElementById("percent").innerText = percent + "%";

                if (percent >= 100) {
                    clearInterval(counter);
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = "index2.html";
                    }, 900);
                }
            }, 40);
        }, 2000);
    };
</script>

</body>
</html>
