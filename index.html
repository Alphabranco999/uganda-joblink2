<!DOCTYPE html>
<html>
<head>
    <title>Uganda JobLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Stop sideways movement + full screen */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #0A2A6B;
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Space for your logo */
        .logo-space {
            height: 120px; /* adjust when you add logo */
            width: 100%;
        }

        /* Title */
        h1 {
            margin: 0 0 30px 0;
            font-size: 40px;
            font-weight: bold;
            opacity: 0;
            text-align: center;
        }

        /* Zoom animation */
        @keyframes zoomIn {
            0% { transform: scale(0.2); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-title {
            animation: zoomIn 1.2s ease-out forwards;
        }

        /* Button */
        button {
            padding: 18px 40px;
            font-size: 24px;
            border: none;
            background: #1DBF73;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            width: 80%;
            max-width: 320px;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            h1 {
                font-size: 48px;
            }

            button {
                font-size: 28px;
                padding: 20px;
            }

            .logo-space {
                height: 140px;
            }
        }
    </style>
</head>

<body>

    <!-- Space for your logo -->
    <div class="logo-space"></div>

    <!-- Title -->
    <h1 id="title">Uganda JobsLink</h1>

    <!-- Button -->
    <button onclick="document.location='index2.html'">OPEN</button>

    <script>
        window.onload = () => {
            const title = document.getElementById("title");
            setTimeout(() => {
                title.classList.add("animate-title");
            }, 200);
        };
    </script>

</body>
</html>
