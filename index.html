<!DOCTYPE html>
<html>
<head>
    <title>Uganda JobLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Full screen + center everything */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;   /* centers vertically */
            align-items: center;       /* centers horizontally */
            background: #0A2A6B;
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        /* Space for your logo */
        .logo-space {
            height: 140px; /* adjust when you add your logo */
            width: 100%;
        }

        /* Title */
        h1 {
            margin: 0 0 40px 0;
            font-size: 50px;   /* BIG title */
            font-weight: bold;
            opacity: 0;
        }

        /* Zoom animation */
        @keyframes zoomIn {
            0% { transform: scale(0.2); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-title {
            animation: zoomIn 1.2s ease-out forwards;
        }

        /* Big centered button */
        button {
            padding: 22px 40px;
            font-size: 30px;       /* BIG button text */
            border: none;
            background: #1DBF73;
            color: white;
            border-radius: 14px;
            cursor: pointer;
            width: 80%;
            max-width: 350px;
        }

        /* Extra phone adjustments */
        @media (max-width: 600px) {
            h1 {
                font-size: 55px;
            }

            button {
                font-size: 32px;
                padding: 24px;
            }

            .logo-space {
                height: 160px;
            }
        }
    </style>
</head>

<body>

    <!-- Space for your logo -->
    <div class="logo-space"></div>

    <!-- Title -->
    <h1 id="title">Uganda JobsLink</h1>

    <!-- Button -->
    <button onclick="document.location='index2.html'">OPEN</button>

    <script>
        window.onload = () => {
            const title = document.getElementById("title");
            setTimeout(() => {
                title.classList.add("animate-title");
            }, 200);
        };
    </script>

</body>
</html>
