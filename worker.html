<style>
 /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    width: 100%;
    margin-top: 0;
   
    background: #ffffff;
    font-family: Arial, sans-serif;
}

/* MOBILE VIEW */
@media (max-width: 600px) {
    body {
        padding: 0px;
    }

    .container, .box, .section, .card {
        width: 100%;
        margin: 0 auto;
     padding: 0px;
    }

    h1, h2, h3 {
        font-size: 22px;
        text-align: center;
    }

    button, .btn {
        width: 100%;
        font-size: 18px;
        padding: 14px;
    }

    img {
        width: 100%;
        height: auto;
    }
}

/* HEADER */
header {
    background: #0057b7;
    padding: 16px 0;
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: bold;
    border-radius: 0 0 12px 12px;
    width 100%;
    
 
}

/* MAIN CONTAINER */
.container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 15px 12px; /* top 
}

/* LABELS */
label {
    font-weight: bold;
    color: #0057b7;
    display: block;
    margin-top: 18px;
    font-size: 16px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 6px;
    background: white;
}

/* TEXTAREA */
textarea {
    height: 100px;
    resize: none;
}

/* CATEGORY BOX */
.job-category {
    margin-top: 25px;
    padding: 18px;
    background: #f5f7fc;
    border-radius: 14px;
    border-left: 6px solid #0057b7;
}

/* CATEGORY TITLE */
.job-category h4 {
    margin-bottom: 14px;
    color: #0057b7;
    font-size: 19px;
    font-weight: bold;
}

/* CHECKBOX GRID */
.job-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* CHECKBOX ITEM */
.job-item {
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #d9d9d9;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
}

/* CHECKBOX SIZE */
.job-item input {
    width: 18px;
    height: 18px;
}

/* SUBMIT BUTTON */
.submit-btn {
    margin-top: 35px;
    width: 100%;
    background: #0057b7;
    color: white;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.submit-btn:hover {
    background: #004a9c;
}

/* BACK BUTTON */
.bottom-back {
    background: #0057b7;
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    display: block;
    margin-top: 30px;
}

.bottom-back:hover {
    background: #004a9c;
}

   .popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.4);
    
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}

.popup.show {
    opacity: 1;
    visibility: visible;
}

.popupBox {
    padding: 20px 30px;
    border-radius: 10px;
    color: white;
    font-size: 18px;
    transform: scale(0.8);
    transition: all 0.3s ease;
}

.popup.show .popupBox {
    transform: scale(1);
}

.success {
    background: #28a745;
}

.error {
    background: #dc3545;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

#loadingOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 99999;
}

/* SPINNER */
.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #fff;
    border-top: 5px solid #0057b7;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

.loading-text {
    color: white;
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
 

</style>
</head>

<script>
function formatPhoneUG(phone) {
    phone = phone.replace(/\s+/g, "");

    if (phone.startsWith("+256")) return "0" + phone.substring(4);
    if (phone.startsWith("256")) return "0" + phone.substring(3);

    return phone;
}
 
function validateForm() {
 
let notes = document.getElementById("notes").value.trim();
    const btn = document.getElementById("submitBtn");

    let name = document.getElementById("name").value.trim();
    let phone = formatPhoneUG(document.getElementById("phone").value.trim());
    document.getElementById("phone").value = phone;
    let location = document.getElementById("location").value.trim();
    let workers = document.getElementById("workers").value.trim();

    let selectedJobs = [];
    document.querySelectorAll(".job:checked").forEach(j => {
        selectedJobs.push(j.parentElement.innerText.trim());
    });

    if (workers <= 0) {
        document.getElementById("popupBoxError").innerText = "Enter valid number of workers";
        showPopup("popupError", 2500);
        return;
    }

    if (!name || !phone || !location || !workers || selectedJobs.length === 0) {
        document.getElementById("name").style.border = name ? "1px solid #ccc" : "2px solid red";
        document.getElementById("phone").style.border = phone ? "1px solid #ccc" : "2px solid red";
        document.getElementById("location").style.border = location ? "1px solid #ccc" : "2px solid red";
        document.getElementById("workers").style.border = workers ? "1px solid #ccc" : "2px solid red";

        document.getElementById("popupBoxError").innerText = "Some required fields are still empty";
        showPopup("popupError", 2500);
        return;
    }

    // ✅ CHANGE BUTTON TEXT HERE
    btn.innerText = "Submitting......";
    btn.disabled = true;
    document.getElementById("loadingOverlay").style.display = "flex";

    if (!navigator.onLine) {
        document.getElementById("popupBoxError").innerText = "Good internet connection required";
        showPopup("popupError", 2500);

        btn.innerText = "Submit Details";
        btn.disabled = false;
        return;
    }
 if (!/^0\d{9}$/.test(phone)) {
    showError("Use valid number like 0712345678");
    btn.innerText = "Submit Details";
    btn.disabled = false;
    return;
}

    
       fetch("https://script.google.com/macros/s/AKfycbzypzTzf9NIbpcDIU3fFfGye_lQmP8TVs4mQSJTtERJAYasZ2HZxX7rK3ZuzpOLjq0o/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
        fullname: name,
        phone: phone,
        location: location,
        workers: workers,
        jobs: selectedJobs.join(", "),
        notes: notes
    })
})
    .then(res => res.text())
    .then(response => {

    setTimeout(() => {
        showPopup("popupSuccess", 3000);

        setTimeout(() => {
            window.location.href = "index2.html";
        }, 3000);

    }, 3000); // ⏳ delay before showing popup

})
    .catch(err => {
        document.getElementById("popupBoxError").innerText = "Server error. Try again.";
        showPopup("popupError", 2500);

        // reset button on error
        btn.innerText = "Submit Details";
        btn.disabled = false;
    });
}

function showPopup(id, duration = 3000) {
    const popup = document.getElementById(id);
    popup.classList.add("show");

    setTimeout(() => {
        popup.classList.remove("show");
    }, duration);
}

document.getElementById("submitBtn").addEventListener("click", validateForm);
</script>
