<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0057b7">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Worker Registration - Joblink Uganda</title>
</head>

<style>
/* (ALL YOUR CSS — UNCHANGED) */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    margin: 0;
    padding: 0px;
    background: #f2f6ff;
    font-family: Arial, sans-serif;
    display: block;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 15px;
}

header {
    background: #0057b7;
    padding: 20px;
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: bold;
    border-radius: 0 0 12px 12px;
}

label {
    font-weight: bold;
    color: #0057b7;
    display: block;
    margin-top: 18px;
    font-size: 15px;
}

input, select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 6px;
    background: white;
}

.job-category {
    margin-top: 25px;
    padding: 18px;
    background: #f5f7fc;
    border-radius: 14px;
    border-left: 6px solid #0057b7;
}

.job-category h4 {
    margin-bottom: 14px;
    color: #0057b7;
    font-size: 19px;
    font-weight: bold;
}

.job-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.job-item {
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #d9d9d9;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
}

.job-item input {
    width: 18px;
    height: 18px;
}

.submit-btn {
    margin-top: 35px;
    width: 100%;
    background: #0057b7;
    color: white;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.submit-btn:hover {
    background: #004a9c;
}

.bottom-back {
    background: #0057b7;
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    display: block;
    margin-top: 30px;
}

.bottom-back:hover {
    background: #004a9c;
}

#popupSuccess, #popupError {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#popupBoxSuccess, #popupBoxError {
    background:#05e918;
    padding:15px 20px;
    border-radius:10px;
    text-align:center;
    font-size:16px;
    color:white;
    animation: pop 0.3s ease;
    font-weight:bold;
    max-width: 80%;
}

#popupBoxError {
    background:#e60d06;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

@media (max-width: 600px) {
    h1, h2, h3 {
        font-size: 20px;
        text-align: center;
    }

    button, .btn {
        width: 100%;
        font-size: 18px;
        padding: 14px;
    }

    img {
        width: 100%;
        height: auto;
    }
}
</style>

<body>

<header>Worker Registration</header>

<div class="container">

<!-- (ALL YOUR FORM CONTENT — UNCHANGED) -->

<label>Full Name</label>
<input id="name" type="text" placeholder="Enter your two names">

<label>Age</label>
<input id="age" type="number" placeholder="Enter your age">

<label>Telephone Number (+256)</label>
<input id="phone" type="tel" placeholder="+256 7XX XXX XXX">

<label>Emergency Contact (+256)</label>
<input id="emergency" type="tel" placeholder="+256 7XX XXX XXX">

<label>Location</label>
<input id="location" type="text" placeholder="Enter your district or town">

<label>Education Level</label>
<select id="education">
<option value="">Select education level</option>
<option>None</option>
<option>Primary</option>
<option>O-Level</option>
<option>A-Level</option>
<option>Certificate</option>
<option>Diploma</option>
<option>Degree</option>
<option>Masters</option>
</select>

<label>Do You Speak English?</label>
<select id="english">
<option value="">Choose option</option>
<option>Yes</option>
<option>No</option>
<option>A little</option>
</select>

<!-- (ALL JOB SECTIONS REMAIN EXACTLY SAME) -->

<button class="submit-btn" onclick="validateForm()">Submit Details</button>

</div>

<!-- SUCCESS POPUP -->
<div id="popupSuccess">
    <div id="popupBoxSuccess">
        Submitted. Wait for a company call
    </div>
</div>

<!-- ERROR POPUP -->
<div id="popupError">
    <div id="popupBoxError">
        Some required fields are still empty
    </div>
</div>

<script>
function validateForm() {
    let name = document.getElementById("name").value.trim();
    let age = document.getElementById("age").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let emergency = document.getElementById("emergency").value.trim();
    let location = document.getElementById("location").value.trim();
    let education = document.getElementById("education").value;
    let english = document.getElementById("english").value;
    let jobs = document.querySelectorAll(".job:checked");

    if (
        !name ||
        !age ||
        !phone ||
        !emergency ||
        !location ||
        !education ||
        !english ||
        jobs.length === 0
    ) {
        document.getElementById("popupError").style.display = "flex";

        setTimeout(function () {
            document.getElementById("popupError").style.display = "none";
        }, 2500);

        return;
    }

    document.getElementById("popupSuccess").style.display = "flex";

    /* ✅ NEW: REDIRECT AFTER 1 SECOND */
    setTimeout(function () {
        document.getElementById("popupSuccess").style.display = "none";
        window.location.href = "index.html"; // change if needed
    }, 1000);
}
</script>

</body>
</html>
