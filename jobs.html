<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0057b7">
    <meta name="viewport" content=width=device-width,initial-scale=1">
<title>Worker Registration - Joblink Uganda</title>
</head>
<style>
  /* GLOBAL RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* PERFECT MOBILE VIEW */
html, body {
    width: 100%;
    margin: 0;
    padding: 0px;
    background: #f2f6ff;
    font-family: Arial, sans-serif;
    display: block;
    justify-content: center;
}

/* MAIN PAGE WRAPPER */
.container {
    width: 100%;
    max-width: 420px;   /* Perfect for Android */
    margin: 0 auto;
    padding: 15px;
}

/* HEADER */
header {
    background: #0057b7;
    padding: 20px;
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: bold;
    border-radius: 0 0 12px 12px;
}

/* LABELS */
label {
    font-weight: bold;
    color: #0057b7;
    display: block;
    margin-top: 18px;
    font-size: 15px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 6px;
    background: white;
}

/* CATEGORY BOX */
.job-category {
    margin-top: 25px;
    padding: 18px;
    background: #f5f7fc;
    border-radius: 14px;
    border-left: 6px solid #0057b7;
}

/* CATEGORY TITLE */
.job-category h4 {
    margin-bottom: 14px;
    color: #0057b7;
    font-size: 19px;
    font-weight: bold;
}

/* CHECKBOX GRID */
.job-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* CHECKBOX ITEM */
.job-item {
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #d9d9d9;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
}

/* CHECKBOX SIZE */
.job-item input {
    width: 18px;
    height: 18px;
}

/* SUBMIT BUTTON */
.submit-btn {
    margin-top: 35px;
    width: 100%;
    background: #0057b7;
    color: white;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.submit-btn:hover {
    background: #004a9c;
}

/* BACK BUTTON */
.bottom-back {
    background: #0057b7;
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    display: block;
    margin-top: 30px;
}

.bottom-back:hover {
    background: #004a9c;
}

/* POPUPS */
#popupSuccess, #popupError {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#popupBoxSuccess, #popupBoxError {
    background:#05e918;
    padding:15px 20px;
    border-radius:10px;
    text-align:center;
    font-size:16px;
    color:white;
    animation: pop 0.3s ease;
    font-weight:bold;
    max-width: 80%;
}

#popupBoxError {
    background:#e60d06;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity:0; }
    100% { transform: scale(1); opacity:1; }
}

/* MOBILE TWEAKS */
@media (max-width: 600px) {
    h1, h2, h3 {
        font-size: 20px;
        text-align: center;
    }

    button, .btn {
        width: 100%;
        font-size: 18px;
        padding: 14px;
    }

    img {
        width: 100%;
        height: auto;
    }
}
  

</head>
</style>
<body>
    
    
<header>Worker Registration</header>

<div class="container">

    <input id="name" type="text" placeholder="Enter your two names">

    <label>Age</label>

    <!-- JOB LIST (UNCHANGED) -->
     <div class="job-category">
        <h4>Hospitality & Service</h4>
        <div class="job-list">
            <label class="job-item"><input type="checkbox" class="job"> Waiter / Waitress</label>

            <label class="job-item"><input type="checkbox" class="job"> Barista</label>
            <label class="job-item"><input type="checkbox" class="job"> Bartender</label>

            <label class="job-item"><input type="checkbox" class="job"> Chef Assistant</label>
            <label class="job-item"><input type="checkbox" class="job"> Maid</label>
        </div>
    </div>
    <div class="job-category">
        <h4>Construction & Skilled Work</h4>
        <div class="job-list">
            <label class="job-item"><input type="checkbox" class="job"> Builder</label>
            <label class="job-item"><input type="checkbox" class="job"> Electrician</label>
            <label class="job-item"><input type="checkbox" class="job"> Plumber</label>
            <label class="job-item"><input type="checkbox" class="job"> Welder</label>
            <label class="job-item"><input type="checkbox" class="job"> Carpenter</label>
            <label class="job-item"><input type="checkbox" class="job"> Painter</label>
            <label class="job-item"><input type="checkbox" class="job"> Mason</label>
            <label class="job-item"><input type="checkbox" class="job"> Roofer</label>

            <label class="job-item"><input type="checkbox" class="job"> Driver</label>
            <label class="job-item"><input type="checkbox" class="job"> Boda Rider</label>
            <label class="job-item"><input type="checkbox" class="job"> IT Technician</label>
            <label class="job-item"><input type="checkbox" class="job"> Phone Repair</label>
            <label class="job-item"><input type="checkbox" class="job"> Computer Repair</label>

    <div class="job-category">

        <div class="job-list">
            <label class="job-item"><input type="checkbox" class="job"> Shop Attendant</label>
            <label class="job-item"><input type="checkbox" class="job"> Mobile Money Agent</label>

            <label class="job-item"><input type="checkbox" class="job"> Cashier</label>

    <div class="job-category">
        <h4>Domestic & Home Services</h4>
        <div class="job-list">

            <label class="job-item"><input type="checkbox" class="job"> Baby Sitter</label>

            <label class="job-item"><input type="checkbox" class="job"> Caregiver</label>

        <div class="job-list">

<button class="submit-btn" onclick="validateForm()">Submit Details</button>

</div>



<!-- SUCCESS POPUP -->
<div id="popupSuccess">
    <div id="popupBoxSuccess">
        Submitted. Wait for a company call
    </div>
</div>

<!-- ERROR POPUP -->
<div id="popupError">
    <div id="popupBoxError">
        Some required fields are still empty
    </div>
</div>

<script>

function validateForm() {
    let name = document.getElementById("name").value.trim();
    let age = document.getElementById("age").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let emergency = document.getElementById("emergency").value.trim();
    let location = document.getElementById("location").value.trim();
    let education = document.getElementById("education").value;
    let english = document.getElementById("english").value;

    // collect selected jobs
    let selectedJobs = [];
    document.querySelectorAll(".job:checked").forEach(j => {
        selectedJobs.push(j.parentElement.innerText.trim());
    });

    // VALIDATION
    if (
        !name ||
        !age ||
        !phone ||
        !emergency ||
        !location ||
        !education ||
        !english ||
        selectedJobs.length === 0
    ) {
        document.getElementById("popupError").style.display = "flex";

        setTimeout(function () {
            document.getElementById("popupError").style.display = "none";
        }, 2500);

        return;
    }

    // ⭐ SEND DATA TO GOOGLE SHEETS ⭐
    fetch("https://script.google.com/macros/s/AKfycbzZj98oWuImbwUhas44nhFE9-k0IvWJTrJld0lQas7UuYDNE824zm6AXJXvlJ77zyPyxA/exec", {
        method: "POST",
        body: JSON.stringify({
            fullname: name,
            age: age,
            phone: phone,
            emergency: emergency,
            location: location,
            education: education,
            english: english,
            jobs: selectedJobs.join(", ")
        })
    })
    .then(res => res.text())
    .then(response => console.log("Server:", response))
    .catch(err => console.error("Error:", err));

    // SUCCESS POPUP
    document.getElementById("popupSuccess").style.display = "flex";

    // REDIRECT AFTER 3 SECONDS
    setTimeout(function () {
        window.location.href = "index2.html";
    }, 3000);

    setTimeout(function () {
        document.getElementById("popupSuccess").style.display = "none";
    }, 3000);
}

</script>




</body>
</html>
